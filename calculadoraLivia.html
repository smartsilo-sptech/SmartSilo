<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira</title>
</head>
<body>
    <h1>Administrando lucros e custos do meu silo</h1>

    Quantidade de sacas para armazenar: <br>
    <input type="text" id="inpt_qntSacas"> <br><br>
    Preço de venda na colheita: <br>
    <input type="text" id="inpt_precoColheita"> <br> <br>
    Meses de armazenamento dos grãos: <br>
    <input type="text" id="inpt_meses"> <br><br>
    Custo operacional do silo por mês: <br> 
    <input type="text" id="inpt_custo"> <br> <br>

    <button onclick="indicador()">Calcular indicador de riscos</button> 
    <div id="div_silo"></div>
</body>
</html>
<script>
    function indicador(){
        let qntSacas = Number(inpt_qntSacas.value)
        let precoColheita = Number(inpt_precoColheita.value)
        let meses = Number(inpt_meses.value)
        let custoOperacional = Number(inpt_custo.value)

        let valorParado = qntSacas * precoColheita 
        let custoSilo = qntSacas * custoOperacional * meses
        let quebraTecnica = qntSacas * 0.99
        let totalRecuperar = valorParado + custoSilo 
        let equilibrio = totalRecuperar/quebraTecnica
        let Porcentagem = (equilibrio/precoColheita - 1) * 100
        
        div_silo.innerHTML = `Você possui um custo de R$${custoSilo}. <br>
        Para seu lucro, o mercado precisa subir pelo menos ${Porcentagem}% nos próximos ${meses} meses.`
    }
</script>
