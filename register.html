<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSilo - Registrar-se</title>
    <link rel="stylesheet" href="./src/css/global.css">
    <link rel="stylesheet" href="./src/css/register-login.css">
    <link rel="stylesheet" href="./src/css/header.css">
</head>
<body class="register">
    <header>
        <div class="header-content">
            <div class="header-left-side">
                <div class="header-logo">
                    <img src="./src/img/icons/logo.png" alt="Ícone da logo" height="40" class="logo-icon">
                </div>
            </div>
            <div class="header-right-side">
                <a href="./index.html">Home</a>
                <a href="./calc.html">Calculadora Financeira</a>
                <div class="login-page-button">
                    <a href="./login.html">Entrar</a>
                </div>
                <div class="register-page-button">
                    <a href="./register.html">Registrar-se</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="left-face">
            <div class="main-left-side">
                <div class="span-box">
                    <span>Registre-se para ter acesso à Dashboard.</span>
                </div>
            </div>
        </div>

        <div class="right-face">
            <div class="main-right-side">
                <div class="form-box">
                    <div class="form-title">
                        <img src="./src/img/icons/logo1.png" alt="Logo" height="60"><br>
                        <span>Bem-vindo(a) ao SmartSilo</span>
                    </div>
                </div>
            </div>

            <form id="registerForm">
                <label for="name">Nome:</label><br>
                <input type="text" id="name" name="name" placeholder="Insira seu nome" class="insert" required><br>

                <label for="email">E-Mail:</label><br>
                <input type="email" id="email" name="email" placeholder="Insira seu e-mail" class="insert" required><br>

                <label for="password">Senha:</label><br>
                <input type="password" id="password" name="password" placeholder="Crie uma senha" class="insert" required><br>

                <label for="confipassword">Confirmar Senha:</label><br>
                <input type="password" id="confipassword" name="confipassword" placeholder="Confirme a senha" class="insert" required><br>

                <div class="submit-button-box">
                    <a href="./login.html" class="submit-button">
                        REGISTRAR
                    </a>
                </div>
            </form>

            <span class="redirect">
                Já tem um usuário? <a href="./login.html">Entre</a>.
            </span>
        </div>
    </main>
</body>
</html>
