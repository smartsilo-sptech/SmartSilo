<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visão Geral - Dashboard</title>
    <link rel="stylesheet" href="./src/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <menu>
        <div class="menu-content">
            <div class="top-menu">
                <div class="menu-message">
                    <span class="menu-title">Dashboard <br> SmartSilo</span>
                </div>
                <div class="menu-navigation">

                </div>
            </div>
            <div class="down-menu">
                <div class="user-img"></div>
            </div>
        </div>
    </menu>
    <main>
        <div class="content">
            <div class="message">
                <span class="span_message">Olá Masashi Kishimoto!</span>
                <span class="span_message">Visão Geral</span>
            </div>
            <div class="charts">
                <div class="charts_left">
                    <div class="left_charts_up">
                        <div class="total_silos">
                            <span class="span_total_silos">Total de Silos:</span>
                        </div>
                        <div class="alertas_ativos">
                            <span class="span_alertas_ativos">Número de alertas ativos:</span>
                        </div>
                        <div class="status_geral">
                            <span class="span_status_geral">Status Geral:</span>
                        </div>
                    </div>
                    <div class="left_charts_down">
                        <div class="silos_tempo_real">
                            <canvas id="barras_tempo_real"></canvas>
                        </div>
                    </div>
                </div>
                <div class="charts_right">
                    <div class="right_charts_up">
                        <div class="silos_alerta">
                            <canvas id="linhas_alerta"></canvas>
                        </div>
                    </div>
                    <div class="right_charts_down">
                        <div class="faixas">
                            <span class="span_faixas">Faixas:</span>
                            <span class="faixa_ideal">Faixa Ideal: 0 - 90%</span>
                            <span class="faixa_alerta">Faixa Alerta: 90 - 95%</span>
                            <span class="faixa_critica">Faixa Crítica: 95 - 100%</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="status">
                <div class="message">
                    <span class="span_message">Status:</span>
                </div>
                <div class="silos">
                    <!--uma porrada de quadrados que serão gerados pelo js obvsbvsbafo\hsdvhaenca-->
                </div>
            </div>
        </div>
    </main>

    <script>
        var tempoReal = new Chart(document.getElementById('barras_tempo_real').getContext('2d'), {
            type: 'bar',
            data: {
            labels: ['Silo 1', 'Silo 2', 'Silo 3', 'Silo 4', 'Silo 5', 'Silo 6', 'Silo 7', 'Silo 8', 'Silo 9', 'Silo 10'],
            datasets: [{
                label: 'Temperatura Média',
                data: [99, 12, 89, 3, 56, 91, 93, 65, 40, 8],
                backgroundColor: function(context) {
                    let valor = context.dataset.data[context.dataIndex];
                    if (valor >= 95) {
                        return '#AB0F0F';
                    } else if (valor >= 90) {
                        return '#FFCD04';
                    } else {
                        return '#0eac50';
                    }
                }
            }]
            },
            options: {
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Silos'
                    },
                    beginAtZero: true,
                },
                y: {
                    title: {
                        display: true,
                        text: 'Porcentagem de Ocupação'
                    },
                    beginAtZero: true
                }
            }
            }
        });

        var alertaCritico = new Chart(document.getElementById('linhas_alerta').getContext('2d'), {
            type: 'line',
            data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Temperatura Média',
                data: [22, 24, 27, 23, 20, 18],
                backgroundColor: ['#0eac50']
            }]
            },
            options: {
            scales: {
                y: {
                beginAtZero: true
                }
            }
            }
        });

        var paginacao = {};
        var tempo = {};

        function obterDados(grafico, endpoint) {
            fetch('http://localhost:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }
                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }

                        grafico.data.labels.push(tempo[endpoint]++);
                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        grafico.update();
                    });
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }

        setInterval(() => {
            obterDados(tempoReal, 'analogico');
            obterDados(alertaCritico, 'digital');
        }, 1000);
    </script>
</body>
</html>
