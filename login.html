<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSilo - Entrar</title>
    <link rel="stylesheet" href="./src/css/global.css">
    <link rel="stylesheet" href="./src/css/register-login.css">
    <link rel="stylesheet" href="./src/css/header.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left-side">
                <div class="header-logo">
                    <img src="" alt="Ícone da logo" height="" class="logo-icon">
                    <img src="" alt="Título da logo" width="" class="logo-title">
                </div>
            </div>
            <div class="header-right-side">
                <a href="./index.html">Home</a>
                <div class="login-page-button">
                    <a href="./login.html">Entrar</a>
                </div>
                <div class="register-page-button">
                    <a href="./register.html">Registrar-se</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="main-content">
            <div class="main-left-side">
                <div class="span-box">
                    <span>Entre para ter acesso à Dashboard.</span>
                </div>
            </div>

            <div class="main-right-side">
                <div class="form-box">
                    <div class="form-title">
                        <img src="./src/img/icons/logo1.png" alt="Logo" height="60">
                        <br>
                        <span>Bem-vindo(a) novamente ao SmartSilo</span>
                    </div>

                    <form id="loginForm">
                        <label for="email">E-mail:</label><br>
                        <input type="email" name="email" id="email" placeholder="Insira seu e-mail" class="insert" required><br>

                        <label for="password">Senha:</label><br>
                        <input type="password" name="password" id="password" placeholder="Insira sua senha" class="insert"
                        required><br>

                        <span>
                            <a href="#" id="forgotLink">Esqueceu sua senha?</a>
                        </span>

                        <div class="submit-button-box">
                            <button type="submit" class="submit-button">ENTRAR</button>
                        </div>
                    </form>

                    <span class="redirect">
                        Ainda não está registrado?
                        <a href="register.html">Registre-se</a>.
                    </span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
