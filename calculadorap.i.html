<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Estratégica de Silo</title>
</head>
<body>
    <h1>Simulador Financeiro do Silo</h1>
    <p>Número do silo:</p>
    <input type="text" id="input_silo">
    <p>Altura total do silo (m):</p>
    <input type="text" id="input_altura">
    <p>Distância medida pelo sensor (m):</p>
    <input type="text" id="input_ocupacao">
    <p>Quantidade estimativa de sacas armazenadas:</p>
    <input type="text" id="input_saca">
    <p>Preço da saca(R$):</p>
    <input type="text" id="input_preco">
    <button onclick="botao()">Calcular</button>
    <div id="resultado"></div>
<!-- Saca é uma unidade de medida usada no agronegócio para comercializar grãos, cada saca equivale 60kg -->
</body>
</html>
<script>
function botao() {
     resultado.innerHTML= `Silo n°  ${input_silo.value} <br>  Percentual ocupado:
      ${Number(input_ocupacao.value) / Number (input_altura.value) * 100} % <br>  Capacidade disponível:
       ${100 - (Number(input_ocupacao.value) / Number (input_altura.value) * 100)} % <br> 
       Valor estimado armazenado: R$ ${Number (input_saca.value) * Number (input_preco.value)}`
}
</script>
