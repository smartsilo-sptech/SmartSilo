<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro Silos</title>
  </head>
  <body>
    <h2>Cadastro De Silos</h2>
    <p>Digite o nome do SILO:</p>
    <input type="text" id="input_nomeSilo" />
    <br>

    <p>Digite a altura TOTAL do SILO (m):</p>
    <input type="number" id="input_alturaTotal" />
    <br>

    <p>Digite o raio do SILO (m):</p>
    <input type="number" id="input_raio" />
    <br>

    <p>Digite a distância do sensor até o grão (m):</p>
    <input type="number" id="input_distanciaSensor" />
    <br>

    <p>Digite a densidade do grão (kg/m³):</p>
    <input type="number" id="input_densidadeGrao" />
    <br>

    <p>Digite o alarme MÍNIMO (%):</p>
    <input type="number" id="input_alarmeMinimo" />
    <br>

    <p>Digite o alarme MÁXIMO (%):</p>
    <input type="number" id="input_alarmeMaximo" />
    <br>

    <button onclick="CadastroSilo()">CADASTRAR SILO</button>

    <div id="div_mensagem"></div>
  </body>
  <script>
    function CadastroSilo() {
      let nomeSilo = input_nomeSilo.value;
      let alturaTotal = Number(input_alturaTotal.value);
      let raioSilo = Number(input_raio.value);
      let distanciaSensor = Number(input_distanciaSensor.value);
      let densidadeGrao = Number(input_densidadeGrao.value);
      let alarmeMIN = Number(input_alarmeMinimo.value);
      let alarmeMAX = Number(input_alarmeMaximo.value);

      // ALTURA OCUPADA
      let alturaOcupada = alturaTotal - distanciaSensor;

      // VOLUME TOTAL DO SILO
      let pi = 3.14;
      let volumeSilo = pi * (raioSilo ** 2) * alturaTotal;

      // VOLUME OCUPADO
      let volumeOcupado = pi * (raioSilo ** 2) * alturaOcupada;

      // QUANTIDADE PROXIMA OCUPADA EM KG
      let quantidadeSilo = volumeOcupado * densidadeGrao;

      //QUANTIDADE FALTANTE EM KG
      let volumeVazio = volumeSilo - volumeOcupado;
      let quantidadeNaoOcupada = volumeVazio * densidadeGrao;

      // OCUPAÇÃO EM PORCENTAGEM
      let ocupacaoPorcentagem = (alturaOcupada / alturaTotal) * 100;



      if (ocupacaoPorcentagem <= alarmeMIN) {
        alert(`O silo atingiu ${ocupacaoPorcentagem.toFixed(2)}%`);
      }

      if (ocupacaoPorcentagem >= alarmeMAX) {
        alert(`O silo atingiu ${ocupacaoPorcentagem.toFixed(2)}%`);
      }

      div_mensagem.innerHTML= `
            <h3>SILO: ${nomeSilo}</h3>
            Volume Total: ${volumeSilo.toFixed(2)} m³ <br>
            Volume Ocupado: ${volumeOcupado.toFixed(2)} m³ <br>
            Quantidade Armazenada: ${quantidadeSilo.toFixed(2)} kg <br>
            Ocupação: ${ocupacaoPorcentagem.toFixed(2)} % <br>
            NÃO ocupado: ${quantidadeNaoOcupada.toFixed(2)}kg <br>
      `

    }
  </script>
</html>
